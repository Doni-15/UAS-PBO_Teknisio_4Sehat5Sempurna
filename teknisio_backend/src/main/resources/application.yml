spring:
  application:
    name: teknisio-backend

  datasource:
    url: jdbc:h2:file:./data/teknisio_db;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH;AUTO_SERVER=TRUE;INIT=CREATE SCHEMA IF NOT EXISTS public\;SET SCHEMA public
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    validate-on-migrate: false

  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: true

server:
  address: 0.0.0.0
  port: ${PORT:${SERVER_PORT:8080}}

app:
  jwt:
    secret: teknisio_super_secret_key_minimum_32_characters
    expiration-ms: 86400000
  cors:
    allowed-origins: http://localhost:8080,http://localhost:3000

management:
  endpoints:
    web:
      exposure:
        include: health,info
  metrics:
    binders:
      processor:
        enabled: false
      system:
        enabled: false
