spring:
  config:
    import: optional:file:.env[.properties]

  application:
    name: ${APP_NAME:teknisio-backend}

  datasource:
    url: '${H2_URL:jdbc:h2:file:./data/teknisio_db;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH;AUTO_SERVER=TRUE;INIT=CREATE SCHEMA IF NOT EXISTS public\;SET SCHEMA public}'
    username: ${H2_USER:sa}
    password: '${H2_PASSWORD:}'
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    validate-on-migrate: false

server:
  address: 0.0.0.0
  port: ${PORT:${SERVER_PORT:8080}}

app:
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  metrics:
    binders:
      processor:
        enabled: false
      system:
        enabled: false
